# This Docker Compose file is used to configure the services required for Fastify's CITGM tests. If you modify the images, be sure to update the ones in the workflows repository as well: https://github.com/fastify/workflows/tree/main/.github/workflows

name: fastify-citgm

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    ports:
      - "9200:9200"

  mongo:
    image: mongo:8.0
    ports:
      - "27017:27017"

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
